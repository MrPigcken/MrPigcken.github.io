<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assert/image/avatar.png" type="image/png" size="512*512">
    <link rel="apple-touch-icon" href="assert/image/avatar.png" type="image/png" size="512*512">
    <link rel="stylesheet" href="assert/css/style.css">
    <link rel="stylesheet" href="./assert/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="icon" type="image/png" href="assert/image/avatar.png">
    <title>杨癫发骁的Github主页</title>
</head>
<body>
    <!-- 主题切换按钮 -->
    <button id="theme-toggle" class="theme-toggle" title="切换主题">
        <i class="fas fa-moon"></i>
    </button>

    <!-- 加载动画 -->
    <div class="loading">
        <div class="loading-text">加载中...</div>
    </div>

    <!-- 容器 -->
    <div class="container">
        <!-- 头部 -->
        <header id="home">
            <img src="assert/image/avatar.png" alt="杨癫发骁" class="profile-img">
            <h1 data-text="杨癫发骁" class="glitch">杨癫发骁</h1>
            <h1 data-text="MrPigcken">MrPigcken</h1>
            <br>
            <p class="title typewriter">初生</p>
            <p class="location"><i class="fas fa-map-marker-alt"></i> 杭州天元公学</p>
            
            <!-- 导航 -->
            <nav>
                <div class="nav-links">
                    <a href="#about" class="nav-link"><i class="fas fa-user"></i> 关于我</a>
                    <a href="#content" class="nav-link"><i class="fas fa-code"></i> 目录</a>
                    <!-- <a href="#experience" class="nav-link"><i class="fas fa-history"></i> 经历</a> -->
                </div>
            </nav>
        </header>

        <!-- 主要内容 -->
        <main>
            <!-- 关于我 -->
            <section id="about" class="section">
                <h2 class="section-title"><i class="fas fa-user-circle"></i> 关于我about me</h2>
                <p class="about-text">
                    本人姓杨，名癫，字发骁，自号发癫芝士，MrPigcken。是"Welcome to ACOJ" 忠实粉丝。
                </p>
            </section>
            <section id="content" class="section">
                <h2 class="section-title"><i class="fas fa-code-branch"></i>目录content</h2>
                <div class="content-grid">
                    <!-- 模板 -->
                    <div class="content-card">
                        <h3 class="content-title">404.html</h3>
                        <p class="content-description">没什么，只是个404页面而已，没事去惹他干吗？</p>
                        <a href="./404.html" class="content-link"><i class="fas fa-external-link-alt"></i>你过来啊</a>
                    </div>
                    <div class="content-card">
                        <h3 class="content-title">好玩的</h3>
                        <p class="content-description">看点好玩的</p>
                        <a href="./forfun/" class="content-link"><i class="fas fa-external-link-alt"></i>呵呵</a>
                    </div>
                </div>
            </section>

            <section id="contents" class="section">
                <h2 class="section-title"><i class="fas fa-code-branch"></i>目录content</h2>
                <div class="content-grid">
                    <!-- 模板 -->
                    <div class="contents-card">
                        <h3 class="contents-title">404.html</h3>
                        <p class="content-description">没什么，只是个404页面而已，没事去惹他干吗？</p>
                        <a href="./404.html" class="content-link"><i class="fas fa-external-link-alt"></i>你过来啊</a>
                    </div>
                    <div class="contents-card">
                        <h3 class="contents-title">好玩的</h3>
                        <p class="contents-description">看点好玩的</p>
                        <a href="./forfun/" class="contents-link"><i class="fas fa-external-link-alt"></i>呵呵</a>
                    </div>
                </div>
            </section>

        </main>
        

        <!-- 页脚 -->
        <footer>
            <div class="social-links">
                <a href="https://github.com/MrPigcken" class="social-link"><i class="fab fa-github"></i></a>
            </div>
            <p class="copyright">© 2026 杨癫发骁. All rights reserved.</p>
            <p class="copyright" style="font-size: 0.8rem; margin-top: 10px;">
                <i class="fas fa-code"></i> 发疯 与 发神经
            </p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="assert/js/script.js"></script>
</body>
</html>
